version: '3.9'

services:

  mysql:
    image: mysql:8.0
    container_name: renault_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: renault
      MYSQL_USER: renault_user
      MYSQL_PASSWORD: renault_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: renault_phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - mysql

  backend:
    build:
      context: ./back/back
      dockerfile: Dockerfile
    container_name: renault_backend
    restart: always
    ports:
      - "5000:8080"
    depends_on:
      - mysql
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "server=mysql;port=3306;database=renault;user=renault_user;password=renault_pass"

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: renault_admin
    restart: always
    ports:
      - "3000:5173"
    depends_on:
      - backend

  user:
    build:
      context: ./user
      dockerfile: Dockerfile
    container_name: renault_user_front
    restart: always
    ports:
      - "3001:5173"
    depends_on:
      - backend

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: renault_keycloak
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    depends_on:
      - mysql

volumes:
  mysql_data: